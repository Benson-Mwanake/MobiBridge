<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Mobile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>MobiBridge | Healthcare Logistics Coordination Platform</title>

    <meta
      name="title"
      content="MobiBridge | Healthcare Logistics Coordination Platform"
    />

    <meta
      name="description"
      content="MobiBridge is a healthcare logistics coordination platform currently in research and validation, exploring better ways for clinics, NGOs and field teams to coordinate mobility aid delivery."
    />

    <meta
      name="keywords"
      content="MobiBridge, mobility aid, healthcare logistics, NGO software, rehabilitation, wheelchair delivery, healthcare coordination platform"
    />

    <meta
      name="author"
      content="MobiBridge"
    />

    <meta
      name="robots"
      content="index,follow"
    />

    <meta
      name="theme-color"
      content="#0F766E"
    />

    <link rel="manifest" href="/manifest.webmanifest">

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://mobibridge.netlify.app/"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      href="/mobibridge.png"
    />

    <link
      rel="apple-touch-icon"
      href="/mobibridge.png"
    />

    <!-- Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:title"
      content="MobiBridge"
    />

    <meta
      property="og:description"
      content="The coordination layer for mobility aid operations."
    />

    <meta
      property="og:url"
      content="https://mobibridge.netlify.app/"
    />

    <meta
      property="og:image"
      content="https://mobibridge.netlify.app/og-image.png"
    />

    <meta
      property="og:site_name"
      content="MobiBridge"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="MobiBridge"
    />

    <meta
      name="twitter:description"
      content="The coordination layer for mobility aid operations."
    />

    <meta
      name="twitter:image"
      content="https://mobibridge.netlify.app/og-image.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MobiBridge",
        "applicationCategory": "HealthcareApplication",
        "operatingSystem": "Web",
        "description": "Healthcare logistics coordination platform for mobility aid delivery.",
        "url": "https://mobibridge.netlify.app",
        "image": "https://mobibridge.netlify.app/og-image.png",
        "creator": {
          "@type": "Organization",
          "name": "MobiBridge"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
